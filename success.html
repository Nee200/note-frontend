<!DOCTYPE html>
<html lang="de">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Bestellung erfolgreich - NOTE. extract de parfume</title>
    <link rel="stylesheet" href="style.css?v=1772547071278">
    <link
        href="https://fonts.googleapis.com/css2?family=Playfair+Display:wght@400;600;700&family=Inter:wght@300;400;500;900&display=swap"
        rel="stylesheet">
    <style>
        .success-container {
            min-height: 60vh;
            display: flex;
            flex-direction: column;
            align-items: center;
            justify-content: center;
            text-align: center;
            padding: 2rem;
        }

        .success-icon {
            font-size: 4rem;
            color: #2c5a45;
            /* Green */
            margin-bottom: 1.5rem;
        }

        h1 {
            font-size: 2.5rem;
            margin-bottom: 1rem;
        }

        p {
            color: var(--text-light);
            max-width: 600px;
            margin-bottom: 2rem;
        }
    </style>
</head>

<body>
    <!-- Navigation (Simplified) -->
    <nav class="navbar">
        <div class="container nav-content">
            <a href="index.html" class="logo-container">
                <span class="logo-main">NØTE.</span>
                <span class="logo-sub">extract de parfume</span>
            </a>
        </div>
    </nav>

    <div class="container success-container">
        <div class="success-icon">✓</div>
        <h1 id="success-title">Vielen Dank für deine Bestellung</h1>
        <p id="success-message">Deine Zahlung war erfolgreich. Wir haben dir eine Bestätigungs-E-Mail gesendet und
            bereiten deine Bestellung für den Versand vor.</p>
        <a href="index.html" class="btn btn-primary">Zurück zum Shop</a>
    </div>

    <script>
        document.addEventListener('DOMContentLoaded', () => {
            // Warenkorb leeren
            localStorage.removeItem('cart');
            localStorage.removeItem('discount');

            // Pickup Text anpassen – URL-Param oder sessionStorage (Fallback)
            const urlParams = new URLSearchParams(window.location.search);
            const isPickup = urlParams.get('pickup') === 'true' || sessionStorage.getItem('isPickupOrder') === 'true';
            sessionStorage.removeItem('isPickupOrder'); // einmal lesen, dann löschen

            if (isPickup) {
                document.getElementById('success-title').innerText = 'Reservierung erfolgreich!';
                document.getElementById('success-mess).it = 'Vielen Dank für deine Reservierung. Wir bereiten deine Bestellung vor und benachrichtigen dich per E-Mail, sobald sie in unserem Store zur Abholung und Barzahlung bereitliegt.';
            }
        });
    </script>
</body>

</html>
